<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能体工作台</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --soft: #f8fafc;
  --line: #e5eaf2;
  --text: #172033;
  --muted: #64748b;
  --faint: #94a3b8;
  --blue: #2563eb;
  --blue-soft: #eff6ff;
  --green: #059669;
  --green-soft: #ecfdf5;
  --amber: #b7791f;
  --amber-soft: #fffbeb;
  --red: #dc2626;
  --red-soft: #fef2f2;
  --shadow: 0 18px 44px rgba(15, 23, 42, .08);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  --mono: "Cascadia Code", Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  overflow: hidden;
  overflow-y: auto;
  background: var(--bg);
  color: var(--text);
  font: 14px/1.55 var(--font);
}
button, textarea, input { font: inherit; }
button { border: 0; cursor: pointer; }
button:disabled { cursor: not-allowed; opacity: .5; }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }

.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: 60px minmax(0, 1fr);
}
.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 24px;
  background: rgba(255,255,255,.92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(10px);
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.mark {
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border-radius: 9px;
  background: #111827;
  color: #fff;
  font-weight: 800;
}
.brand h1 { margin: 0; font-size: 16px; line-height: 1.2; }
.brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
.top-spacer { flex: 1; }
.status {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 30px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--soft);
  color: var(--muted);
  font-size: 12px;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
.dot.on { background: var(--green); }
.dot.busy { background: #f59e0b; }

.layout {
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 340px;
}
.main {
  min-width: 0;
  min-height: 0;
  display: grid;
  grid-template-rows: auto minmax(200px, 1fr) auto;
}
.progress-strip {
  padding: 16px 28px 8px;
}
.steps {
  max-width: 980px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.step {
  height: 52px;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--card);
  color: var(--muted);
}
.step-no {
  width: 24px;
  height: 24px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: var(--soft);
  border: 1px solid var(--line);
  font-size: 12px;
  font-weight: 700;
}
.step.active { color: var(--blue); border-color: #bfdbfe; background: var(--blue-soft); }
.step.done { color: var(--green); }
.step.active .step-no { background: #fff; border-color: #bfdbfe; }
.step.done .step-no { background: var(--green-soft); border-color: #bbf7d0; }
.step-title { font-weight: 700; color: var(--text); }
.step small { display: block; color: var(--muted); font-size: 11px; margin-top: 1px; }

.chat {
  overflow: auto;
  padding: 10px 28px 24px;
}
.chat-inner {
  max-width: 980px;
  margin: 0 auto;
}
.welcome {
  margin: 10px 0 18px;
  padding: 22px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--card);
  box-shadow: var(--shadow);
}
.welcome h2 { margin: 0 0 8px; font-size: 22px; }
.welcome p { margin: 0 0 18px; color: var(--muted); }
.role-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
  margin: 0 0 16px;
}
.role-card {
  min-height: 112px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #fbfdff;
  text-align: left;
  transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
}
.role-card:hover {
  border-color: #bfdbfe;
  box-shadow: 0 10px 24px rgba(15, 23, 42, .07);
  transform: translateY(-1px);
}
.role-card.active {
  border-color: #93c5fd;
  background: var(--blue-soft);
  box-shadow: 0 0 0 3px rgba(37,99,235,.10);
}
.role-card strong {
  display: block;
  margin-bottom: 5px;
  color: var(--text);
  font-size: 15px;
}
.role-card span {
  display: block;
  color: var(--muted);
  font-size: 13px;
}
.role-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.role-tags em {
  height: 22px;
  padding: 0 8px;
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  background: #fff;
  border: 1px solid var(--line);
  color: var(--muted);
  font-style: normal;
  font-size: 12px;
}
.upload-card {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 14px;
  border: 1px dashed #b7c4d6;
  border-radius: 12px;
  background: #fbfdff;
}
.upload-card.dragging { border-color: var(--blue); background: var(--blue-soft); }
.upload-card strong { display: block; margin-bottom: 4px; }
.upload-card span { color: var(--muted); font-size: 13px; }

.msg {
  display: grid;
  grid-template-columns: 36px minmax(0, 780px);
  gap: 10px;
  margin-bottom: 16px;
}
.msg.user {
  grid-template-columns: minmax(0, 780px) 36px;
  justify-content: end;
}
.avatar {
  width: 36px;
  height: 36px;
  display: grid;
  place-items: center;
  border-radius: 10px;
  background: #111827;
  color: #fff;
  font-weight: 800;
}
.msg.user .avatar { grid-column: 2; background: var(--blue); }
.bubble {
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--card);
  box-shadow: 0 8px 22px rgba(15,23,42,.04);
}
.msg.user .bubble {
  grid-column: 1;
  grid-row: 1;
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
}
.bubble-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 13px;
  color: var(--muted);
  font-size: 12px;
  border-bottom: 1px solid var(--line);
}
.msg.user .bubble-head { color: rgba(255,255,255,.82); border-color: rgba(255,255,255,.2); }
.bubble-body { padding: 13px; white-space: pre-wrap; word-break: break-word; }

.parse-card { padding: 0 13px 13px; display: grid; gap: 12px; }
.summary-card {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.metric {
  padding: 11px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--soft);
}
.metric span { color: var(--muted); font-size: 12px; }
.metric strong { display: block; margin-top: 3px; font-size: 20px; }
.next-actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.action {
  min-height: 56px;
  text-align: left;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--card);
}
.action:hover { border-color: #bfdbfe; background: var(--blue-soft); }
.action strong { display: block; font-size: 13px; margin-bottom: 3px; }
.action span { color: var(--muted); font-size: 12px; }
.config-list {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 2px;
}
.config {
  width: 170px;
  flex: 0 0 170px;
  text-align: left;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--soft);
}
.config.active { border-color: #f4c430; background: #fff8da; }
.config strong { display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.config span { display: block; color: var(--muted); font-size: 12px; margin-top: 5px; }
details.advanced {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--soft);
  overflow: hidden;
}
details.advanced summary {
  height: 36px;
  display: flex;
  align-items: center;
  padding: 0 11px;
  color: var(--muted);
  cursor: pointer;
}
.matrix-wrap { overflow: auto; border-top: 1px solid var(--line); background: var(--card); }
table { border-collapse: collapse; width: 100%; }
.matrix { min-width: 760px; table-layout: fixed; font-size: 13px; }
.matrix th, .matrix td {
  padding: 7px 9px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-right: 1px solid #edf0f4;
  border-bottom: 1px solid #edf0f4;
}
.matrix th { background: #f1f4f8; color: #4b5a70; }
.matrix th:first-child, .matrix td:first-child {
  position: sticky;
  left: 0;
  background: #f8fafc;
  text-align: left;
  font-weight: 700;
}
.matrix .focus { background: #fff3bf; font-weight: 700; }

.composer {
  padding: 12px 28px 18px;
  background: rgba(255,255,255,.9);
  border-top: 1px solid var(--line);
  backdrop-filter: blur(10px);
}
.composer-inner {
  max-width: 980px;
  margin: 0 auto;
}
.chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 8px;
}
.chip {
  height: 30px;
  padding: 0 11px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--muted);
  white-space: nowrap;
}
.chip:hover { color: var(--blue); background: var(--blue-soft); border-color: #bfdbfe; }
.input-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 8px;
  align-items: end;
}
textarea {
  width: 100%;
  min-height: 48px;
  max-height: 150px;
  resize: none;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  outline: none;
  background: var(--card);
}
textarea:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
.btn {
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--card);
  color: var(--text);
  white-space: nowrap;
}
.btn:hover { background: var(--soft); }
.btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }

.aside {
  min-width: 0;
  overflow: auto;
  background: var(--card);
  border-left: 1px solid var(--line);
  padding: 16px;
}
.aside-section {
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}
.aside-title {
  padding: 11px 12px;
  font-weight: 800;
  border-bottom: 1px solid var(--line);
}
.aside-body { padding: 12px; }
.kv {
  display: grid;
  grid-template-columns: 86px 1fr;
  gap: 8px;
  min-height: 32px;
  align-items: center;
  border-bottom: 1px solid #edf0f4;
}
.kv:last-child { border-bottom: 0; }
.kv span:first-child { color: var(--muted); }
.risk {
  padding: 9px;
  border: 1px solid var(--line);
  border-radius: 9px;
  background: var(--soft);
  margin-bottom: 8px;
}
.badge {
  display: inline-flex;
  align-items: center;
  height: 22px;
  padding: 0 8px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--soft);
  color: var(--muted);
  font-size: 12px;
}
.badge.ok { color: var(--green); background: var(--green-soft); border-color: #bbf7d0; }
.badge.warn { color: var(--amber); background: var(--amber-soft); border-color: #fde68a; }
.badge.danger { color: var(--red); background: var(--red-soft); border-color: #fecaca; }
.json-box {
  max-height: 260px;
  overflow: auto;
  padding: 10px;
  border-radius: 9px;
  background: #0f172a;
  color: #dbeafe;
  font: 12px/1.6 var(--mono);
  white-space: pre-wrap;
}
.toast {
  position: fixed;
  right: 20px;
  bottom: 20px;
  display: grid;
  gap: 8px;
}
.toast-item {
  width: 310px;
  padding: 10px 12px;
  border-radius: 10px;
  background: #111827;
  color: #fff;
  box-shadow: var(--shadow);
}
/* ── Employee selector ── */
.emp-select {
  height: 34px; padding: 0 10px;
  border: 1px solid var(--line); border-radius: 8px;
  background: var(--card); color: var(--text);
  font: inherit; cursor: pointer; outline: none;
  min-width: 140px;
}
.emp-select:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

/* ── Chat mode: hide strategy-specific UI ── */
.app.mode-chat .strategy-only { display: none !important; }
.app.mode-chat .brand h1::after { content: ''; }
.app.mode-chat #btnAttach { display: none; }
.app.mode-chat .input-row { grid-template-columns: minmax(0, 1fr) auto; }
.app.mode-chat .layout { grid-template-columns: 1fr; }
.app.mode-chat .aside { display: none; }

/* ── Markdown rendering in bot bubbles ── */
.bubble-body.md { white-space: normal; }
.bubble-body.md > *:first-child { margin-top: 0; }
.bubble-body.md > *:last-child { margin-bottom: 0; }
.bubble-body.md h1,.bubble-body.md h2,.bubble-body.md h3,.bubble-body.md h4 { margin: 12px 0 6px; font-weight: 700; line-height: 1.35; }
.bubble-body.md h1 { font-size: 17px; border-bottom: 2px solid var(--blue); padding-bottom: 5px; }
.bubble-body.md h2 { font-size: 15px; border-bottom: 1px solid var(--line); padding-bottom: 4px; }
.bubble-body.md h2::before { content: ''; display: inline-block; width: 3px; height: 13px; background: var(--blue); border-radius: 2px; margin-right: 6px; vertical-align: middle; }
.bubble-body.md h3 { font-size: 14px; color: #1e40af; }
.bubble-body.md h3::before { content: '▸ '; color: var(--blue); }
.bubble-body.md p { margin: 5px 0; line-height: 1.75; }
.bubble-body.md ul,.bubble-body.md ol { margin: 5px 0; padding-left: 18px; }
.bubble-body.md li { margin: 3px 0; line-height: 1.65; }
.bubble-body.md li::marker { color: var(--blue); }
.bubble-body.md strong { font-weight: 650; }
.bubble-body.md code {
  font-family: var(--mono); font-size: 12px;
  background: #f1f5f9; border: 1px solid #e2e8f0;
  padding: 1px 5px; border-radius: 3px; color: #b91c1c;
}
.bubble-body.md pre { margin: 6px 0; border-radius: 6px; overflow-x: auto; background: #f8fafc; border: 1px solid var(--line); }
.bubble-body.md pre code { display: block; padding: 10px 12px; background: none; border: none; color: var(--text); }
.bubble-body.md blockquote { margin: 6px 0; padding: 5px 12px; border-left: 3px solid var(--blue); background: var(--blue-soft); border-radius: 0 4px 4px 0; color: var(--muted); font-size: 13px; }
.bubble-body.md hr { margin: 10px 0; border: none; border-top: 1px solid var(--line); }
.bubble-body.md table { width: 100%; border-collapse: collapse; margin: 6px 0; font-size: 12px; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
.bubble-body.md thead th { background: #f1f4f8; font-weight: 650; color: #4b5a70; padding: 7px 9px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
.bubble-body.md tbody td { padding: 5px 9px; border-bottom: 1px solid #edf0f4; vertical-align: top; }
.bubble-body.md tbody tr:last-child td { border-bottom: none; }
.bubble-body.md tbody tr:hover td { background: #f8fbff; }

@media (max-width: 1180px) {
  .layout { grid-template-columns: 1fr; }
  .aside { display: none; }
}
@media (max-height: 600px) {
  body { overflow: auto; }
  .app { min-height: auto; }
  .chat { min-height: 200px; overflow: auto; }
}
@media (max-width: 760px) {
  body { overflow: auto; }
  .app { height: auto; min-height: 100vh; }
  .layout { display: block; }
  .steps, .summary-card, .next-actions { grid-template-columns: 1fr; }
  .topbar { padding: 0 12px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="mark">AI</div>
      <div>
        <h1 id="brandTitle">充值策略助手</h1>
        <p id="brandDesc">上传 Excel，用聊天完成解析、核对、预检和创建</p>
      </div>
    </div>
    <select class="emp-select" id="employeeSelect">
      <option value="recharge-strategy-assistant">📊 充值策略助手</option>
      <option value="demo-assistant">🤖 演示助手</option>
    </select>
    <div class="top-spacer"></div>
    <div class="status"><span class="dot" id="serviceDot"></span><span id="serviceText">服务检测中</span></div>
    <div class="status strategy-only"><span class="dot" id="parseDot"></span><span id="parseText">等待上传</span></div>
    <a href="/admin.html" class="btn" style="text-decoration:none;font-size:13px">⚙ 管理</a>
    <button class="btn strategy-only" id="btnDemo">演示</button>
    <button class="btn primary strategy-only" id="btnHeaderUpload">上传 Excel</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden>
  </header>

  <div class="layout">
    <main class="main">
      <div class="progress-strip strategy-only">
        <div class="steps" id="steps"></div>
      </div>

      <section class="chat" id="chat">
        <div class="chat-inner" id="chatInner">
          <div class="welcome" id="welcome">
            <h2 id="welcomeTitle">把充值策略 Excel 发给我</h2>
            <p id="welcomeDesc">我会先帮你读懂这份表，再一步步问你确认。你不需要看 JSON，也不需要知道内部字段名。</p>
            <div class="role-cards" id="roleCards"></div>
            <div class="upload-card strategy-only" id="uploadCard">
              <div>
                <strong>第一步：上传 Excel</strong>
                <span>支持拖拽到这里，或点击右侧按钮选择文件。</span>
              </div>
              <button class="btn primary" id="btnWelcomeUpload">选择文件</button>
            </div>
          </div>
        </div>
      </section>

      <footer class="composer">
        <div class="composer-inner">
          <div class="chips" id="chips"></div>
          <div class="input-row">
            <button class="btn" id="btnAttach">上传</button>
            <textarea id="input" placeholder="例如：帮我解释这份策略、先预检、解释第 3 组、确认创建..."></textarea>
            <button class="btn primary" id="btnSend">发送</button>
          </div>
        </div>
      </footer>
    </main>

    <aside class="aside" id="aside"></aside>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API_BASE = location.origin;
const API_RUN = `${API_BASE}/api/v1/agentapp/agent/run`;
const API_EMPLOYEES = `${API_BASE}/api/v1/agentapp/agent/employees`;
const API_UPLOAD = `${API_BASE}/api/v1/agentapp/StrategyProxy/Upload`;
const API_PARSE = `${API_BASE}/api/v1/agentapp/StrategyProxy/ParseStatus`;

marked.setOptions({ breaks: true, gfm: true });

const employeeMeta = {
  'recharge-strategy-assistant': { name: '充值策略助手', brand: '充值策略助手', desc: '上传 Excel，用聊天完成解析、核对、预检和创建', welcomeTitle: '把充值策略 Excel 发给我', welcomeDesc: '我会先帮你读懂这份表，再一步步问你确认。你不需要看 JSON，也不需要知道内部字段名。', mode: 'strategy' },
  'demo-assistant': { name: '演示助手', brand: '智能体工作台', desc: '你的 AI 工作助手，随时可以对话', welcomeTitle: '你好，有什么可以帮你的？', welcomeDesc: '你可以直接输入问题，我会尽力帮你解答。', mode: 'chat' }
};
function getEmpKey() { return $('employeeSelect').value; }
function getEmpMeta() { return employeeMeta[getEmpKey()] || employeeMeta['demo-assistant']; }

const state = {
  file: null,
  workbook: null,
  preview: null,
  backendRaw: null,
  snapshotId: null,
  sessionId: null,
  selectedIndex: 0,
  phase: 'upload',
  traces: [],
  busy: false,
  lastLocalText: '',
  employees: []
};

const stepDefs = [
  ['upload', '上传', '选择 Excel'],
  ['explain', '解释', '读懂策略'],
  ['precheck', '预检', '检查风险'],
  ['create', '创建', '确认执行']
];

function $(id) { return document.getElementById(id); }
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeText() { return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' }); }
function asArray(v) { return Array.isArray(v) ? v : (v == null ? [] : [v]); }
function unique(v) { return [...new Set(v.filter(Boolean))]; }
function compact(v, fallback = '-') {
  if (v == null || v === '') return fallback;
  if (Array.isArray(v)) return v.length ? v.map(x => typeof x === 'object' ? (x.regionName || x.regionCode || JSON.stringify(x)) : x).join(' / ') : fallback;
  if (typeof v === 'object') return v.name || v.regionName || JSON.stringify(v);
  return String(v);
}

function fallbackEmployees() {
  return Object.entries(employeeMeta).map(([employeeKey, meta]) => ({
    employeeKey,
    name: meta.name,
    description: meta.desc,
    tags: meta.mode === 'strategy' ? ['Excel', '工具'] : ['聊天']
  }));
}

function mergeEmployeeMeta(item) {
  if (!item || !item.employeeKey) return null;
  const key = item.employeeKey;
  const old = employeeMeta[key] || {};
  const isStrategy = key === 'recharge-strategy-assistant';
  const name = item.name || old.name || key;
  employeeMeta[key] = {
    name,
    brand: old.brand || name,
    desc: item.description || old.desc || '选择这个数字员工后，可以直接通过对话推进任务。',
    welcomeTitle: old.welcomeTitle || `你好，我是${name}`,
    welcomeDesc: old.welcomeDesc || '你可以直接输入问题。我会根据当前角色的能力和工具来处理。',
    mode: old.mode || (isStrategy ? 'strategy' : 'chat'),
    tags: item.tags || old.tags || []
  };
  return { employeeKey: key, name, description: employeeMeta[key].desc, tags: employeeMeta[key].tags };
}

function renderEmployeeSelect() {

async function loadEmployees() {
  try {
    const r = await fetch(API_EMPLOYEES, { signal: AbortSignal.timeout(4000) });
    if (!r.ok) throw new Error('employees api failed');
    const payload = await r.json();
    const rows = Array.isArray(payload.data) ? payload.data : [];
    state.employees = rows.map(mergeEmployeeMeta).filter(Boolean);
  } catch {
    state.employees = fallbackEmployees().map(mergeEmployeeMeta).filter(Boolean);
  }

function setPhase(phase, text) {
  state.phase = phase;
  const dot = $('parseDot');
  dot.className = 'dot';
  if (phase === 'uploading' || phase === 'parsing') dot.classList.add('busy');
  if (['explain','precheck','create','ready'].includes(phase)) dot.classList.add('on');
  $('parseText').textContent = text;
  renderSteps();
  renderAside();
}

function renderSteps() {
  const order = ['upload', 'explain', 'precheck', 'create'];
  const activeMap = { upload: 'upload', uploading: 'upload', parsing: 'explain', ready: 'explain', explain: 'explain', precheck: 'precheck', create: 'create' };
  const active = activeMap[state.phase] || 'upload';
  const activeIndex = order.indexOf(active);
  $('steps').innerHTML = stepDefs.map(([key, title, sub], i) => `
    <div class="step ${i < activeIndex ? 'done' : ''} ${key === active ? 'active' : ''}">
      <div class="step-no">${i + 1}</div>
      <div><div class="step-title">${title}</div><small>${sub}</small></div>

function renderMatrix(configs) {

function kv(k, v) { return `<div class="kv"><span>${esc(k)}</span><span title="${esc(v)}">${esc(v)}</span></div>`; }

function riskItems() {
  const v = normalizePreview(state.preview).validation || {};

    ...asArray(v.duplicateNames).map(x => ({ type: 'warn', label: '名称重复', text: x.name || JSON.stringify(x) })),
    ...asArray(v.suggestions).map(x => ({ type: 'ok', label: '建议', text: x }))
  ];
}

async function sendPrompt(promptText) {
  const prompt = (promptText || $('input').value || '').trim();
  if (!prompt || state.busy) return;
  $('input').value = '';
  state.busy = true;
  addMsg('user', prompt);
  showThinking();
  const empKey = getEmpKey();
  const isStrategy = getEmpMeta().mode === 'strategy';
  const body = {
    employeeKey: empKey,
    userInput: prompt,
    sessionId: state.sessionId || null,
    workflowKey: isStrategy ? 'recharge-strategy-chat' : null,
    extraContext: isStrategy ? JSON.stringify(
      state.snapshotId
        ? { snapshotId: state.snapshotId, selectedConfigIndex: state.selectedIndex, selectedConfig: getConfigs()[state.selectedIndex] || null }
        : { localExcelText: state.lastLocalText }
    ) : null,
    structuredSchemaJson: null
  };
  try {
    const r = await fetch(API_RUN, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const json = await r.json();
    if (!r.ok || json.code !== 200) throw new Error(json.message || 'Agent 调用失败');
    const data = json.data || {};
    state.traces = data.traces || [];
    if (data.sessionId) state.sessionId = data.sessionId;
    hideThinking();
    addMsg('assistant', data.assistantMessage || '(空回复)');
    if (isStrategy && /预检/.test(prompt)) setPhase('precheck', '预检中/待确认');
    if (isStrategy && /创建/.test(prompt)) setPhase('create', '创建指令已发送');
  } catch (err) {
    hideThinking();
    addMsg('assistant', `这一步调用失败：${err.message}`);
  } finally {
    state.busy = false;
    renderAside();
  }
}

async function handleFile(file) {
  state.file = file;
  $('welcome').style.display = 'none';
  addMsg('user', `上传 Excel：${file.name}`);
  setPhase('uploading', '读取 Excel 中');
  try {
    const workbook = await readWorkbook(file);
    state.workbook = workbook;
    state.lastLocalText = workbookToText(workbook, 50);
    state.preview = null;
    state.backendRaw = null;
    state.selectedIndex = 0;
    setPhase('explain', '已读取 Excel');
    // 直接把真实表格文本交给 Agent 解析，不再用本地启发式伪造解析结果
    sendPrompt(`我上传了 Excel 文件「${file.name}」，请帮我解释一下这份策略的整体内容。`);
    // 后台静默尝试上传到 Admin API（有就用 snapshotId，没有不影响）
    uploadToBackend(file);
  } catch (err) {
    setPhase('upload', '读取失败');
    addMsg('assistant', `Excel 读取失败：${err.message}`);
  }
}

function readWorkbook(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const sheets = {};
        wb.SheetNames.forEach(name => {
          sheets[name] = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: '' });
        });
        resolve({ sheetNames: wb.SheetNames, sheets });
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(reader.error || new Error('文件读取异常'));
    reader.readAsArrayBuffer(file);
  });
}

async function uploadToBackend(file) {
  try {
    const form = new FormData();
    form.append('file', file);
    form.append('strategyType', 'recharge');
    form.append('description', '充值策略助手上传');
    const r = await fetch(API_UPLOAD, { method: 'POST', body: form });
    const json = await r.json();
    state.backendRaw = json;
    const snap = json?.data?.snapshotId || json?.data?.id || json?.data;
    if (!r.ok || json.code !== 200 || !snap) throw new Error(json.message || '后端未返回 snapshotId');
    state.snapshotId = String(snap);
    console.log('[upload] snapshotId =', state.snapshotId);
    pollParseResult();
  } catch (err) {
    // Admin API 不可用时静默降级，Agent 直接用 Excel 文本工作
    console.log('[upload] Admin API 不可用，使用直接解析模式:', err.message);
  }
}

async function pollParseResult() {
  for (let i = 0; i < 60; i++) {
    try {
      const r = await fetch(`${API_PARSE}?snapshotId=${encodeURIComponent(state.snapshotId)}`);
      const json = await r.json();
      state.backendRaw = json;
      const data = json?.data?.data || json?.data || json;
      const preview = normalizePreview(data);
      const status = data?.status ?? data?.parseStatus ?? data?.data?.status;
      if (preview?.preview?.configs?.length) {
        state.preview = preview;
        setPhase('explain', '正式解析完成');
        addMsg('assistant', `正式解析完成。我识别到 ${preview.preview.configs.length} 个配置组。现在建议先让我解释整体策略，再做预检。`, renderParseCard());
        return;
      }
      if (status === 2 || status === 'failed') throw new Error(data?.message || '解析失败');
      await sleep(2000);
    } catch (err) {
      if (i > 2) {
        setPhase('explain', '直接解析模式');
        console.log('[parse] 后端解析未返回，继续基于 Excel 文本对话:', err.message);
        return;
      }
      await sleep(1800);
    }
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function getConfigs() { return normalizePreview(state.preview).preview?.configs || []; }
function normalizePreview(raw) {
  if (!raw) return {};
  if (raw.preview?.configs) return raw;
  if (raw.data?.preview?.configs) return raw.data;
  if (raw.data?.data?.preview?.configs) return raw.data.data;
  if (raw.data?.data?.data?.preview?.configs) return raw.data.data.data;
  return raw;
}

function workbookToText(workbook, maxLines) {
  return Object.fromEntries(workbook.sheetNames.map(name => [name, (workbook.sheets[name] || []).slice(0, maxLines).map(r => r.join('\t')).join('\n')]));
}
function configTitle(c, i = 0) { return c?.strategyName || c?.userSegmentsRule?.name || `配置 ${i + 1}`; }
function shortTitle(s) { return String(s || '').length > 15 ? `${String(s).slice(0, 15)}...` : String(s || ''); }
function countProducts(c) { return (c.abTestGroups || []).reduce((n, g) => n + (g.coinPackBoard?.products?.length || 0) + (g.subscriptionBoard?.products?.length || 0), 0); }
function platformText(v) { const map = { 0: '全平台', 1: 'iOS', 2: 'Android' }; const arr = asArray(v); return arr.length ? arr.map(x => map[x] || x).join(' / ') : '全平台'; }
function payText(v) { return v === true ? '付费用户' : v === false ? '非付费用户' : '不限'; }
function operatorText(c) { return ({ 2:'<=', 3:'>=', 4:'区间', 5:'=', 6:'包含', 7:'排除', 8:'<', 9:'>' })[c] || (c == null ? '-' : String(c)); }
function ruleValue(o, name) { const v = o?.[name]; if (v == null || (Array.isArray(v) && !v.length)) return '-'; return `${operatorText(o?.[`${name}Rule`])} ${compact(v)}`; }
function sceneName(c) { return ({ 1:'阅读器', 2:'个人中心/书城', 3:'充值结果页', 10:'广告', 11:'触达平台', 15:'会员取订' })[c] || c; }

    controlGroupPercentage: 50,
    experimentGroupPercentage: 50,
    abTestGroups: [{ groupName: i % 3 === 0 ? '对照组' : '全量', sceneList: i % 2 ? [1, 15] : [1], checkProductType: 1, coinPackBoard: { name: `直充 ${name}`, products: [10, 15, 30, 45, 60].map((p, idx) => ({ productPrice: p, productGiveawayTotal: idx * 5 })) }, subscriptionBoard: { name: `订阅 ${name}`, products: [{ productPrice: 9.99 + i, productServiceTimeLengthType: 6 }] } }]
  })) }
};

async function checkHealth() {
  try {
    const r = await fetch(`${API_BASE}/healthcheck`, { signal: AbortSignal.timeout(3000) });
    if (!r.ok) throw new Error();
    $('serviceDot').className = 'dot on';
    $('serviceText').textContent = '服务在线';
  } catch {
    $('serviceDot').className = 'dot';
    $('serviceText').textContent = '服务不可达';
  }
}
function switchMode(isInit) {
  const meta = getEmpMeta();
  const app = document.querySelector('.app');
  if (meta.mode === 'chat') {
    app.classList.add('mode-chat');
    app.classList.remove('mode-strategy');
  } else {
    app.classList.remove('mode-chat');
    app.classList.add('mode-strategy');
  }
  $('brandTitle').textContent = meta.brand;
  $('brandDesc').textContent = meta.desc;
  $('welcomeTitle').textContent = meta.welcomeTitle;
  $('welcomeDesc').textContent = meta.welcomeDesc;
  $('input').placeholder = meta.mode === 'strategy'
    ? '例如：帮我解释这份策略、先预检、解释第 3 组、确认创建...'
    : '输入你的问题...';
  renderRoleCards();
  // 切换时清空聊天记录和状态（初始化时不清）
  if (!isInit) {
    $('chatInner').querySelectorAll('.msg').forEach(el => el.remove());
    state.file = null; state.workbook = null; state.preview = null;
    state.backendRaw = null; state.snapshotId = null; state.sessionId = null;
    state.selectedIndex = 0; state.phase = 'upload';
    state.traces = []; state.busy = false; state.lastLocalText = '';
    $('serviceDot').className = 'dot';
    setPhase('upload', '等待上传');
  }
  $('welcome').style.display = '';
  renderAside();
}

function bindStaticEvents() {
  ['btnHeaderUpload','btnWelcomeUpload','btnAttach'].forEach(id => $(id).addEventListener('click', () => $('fileInput').click()));
  $('fileInput').addEventListener('change', e => { const f = e.target.files[0]; if (f) handleFile(f); e.target.value = ''; });
  $('btnSend').addEventListener('click', () => sendPrompt());
  $('input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); } });
  const upload = $('uploadCard');
  ['dragenter','dragover'].forEach(x => upload.addEventListener(x, e => { e.preventDefault(); upload.classList.add('dragging'); }));
  ['dragleave','drop'].forEach(x => upload.addEventListener(x, e => { e.preventDefault(); upload.classList.remove('dragging'); }));
  upload.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) handleFile(f); });
  $('employeeSelect').addEventListener('change', () => switchMode(false));
  $('btnDemo').addEventListener('click', () => {
    $('welcome').style.display = 'none';
    state.file = { name: '演示充值策略模板.xlsx' };
    state.preview = demoPreview;
    state.backendRaw = demoPreview;
    state.snapshotId = 'demo-snapshot';
    state.selectedIndex = 0;
    setPhase('explain', '演示已载入');
    addMsg('user', '载入一份演示充值策略 Excel');
    addMsg('assistant', '我读完了。先别急着创建，建议按下面顺序：解释策略、检查风险、开始预检。', renderParseCard());
  });
}

bindStaticEvents();
state.employees = fallbackEmployees().map(mergeEmployeeMeta).filter(Boolean);
renderEmployeeSelect();
switchMode(true);
loadEmployees();
renderSteps();
checkHealth();
setInterval(checkHealth, 15000);
if (new URLSearchParams(location.search).get('demo') === '1') $('btnDemo').click();
</script>
</body>
</html>
